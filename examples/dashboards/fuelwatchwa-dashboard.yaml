# FuelWatch WA - Example Dashboard
# Add this to your Lovelace dashboard via the UI or include in your dashboard YAML
#
# NOTE: Entity IDs include your configured location.
# Replace 'perth' in the examples below with your actual location (lowercase, underscores for spaces).
# Example: 'Caversham' becomes 'caversham', 'South Perth' becomes 'south_perth'
#
# Entity naming pattern: sensor.{location}_{fuel_type}_{sensor_name}
# Example: sensor.caversham_diesel_minimum_price

# Dashboard configuration (if using YAML mode)
title: Fuel Prices
path: fuel-prices
icon: mdi:gas-station
badges: []
cards:
  # Diesel Summary Card
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          ## 🚛 Diesel Prices
      - type: entities
        entities:
          - entity: sensor.perth_diesel_minimum_price
          - entity: sensor.perth_diesel_average_price
          - entity: sensor.perth_diesel_maximum_price
          - entity: sensor.perth_diesel_price_spread
          - entity: sensor.perth_diesel_station_count
        show_header_toggle: false

      - type: glance
        title: Cheapest Diesel Station
        entities:
          - entity: sensor.perth_diesel_cheapest_price
          - entity: sensor.perth_diesel_cheapest_brand
          - entity: sensor.perth_diesel_cheapest_address

  # Premium Summary Card
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          ## ⛽ Premium 98 Prices
      - type: entities
        entities:
          - entity: sensor.perth_premium_98_minimum_price
          - entity: sensor.perth_premium_98_average_price
          - entity: sensor.perth_premium_98_maximum_price
          - entity: sensor.perth_premium_98_price_spread
          - entity: sensor.perth_premium_98_station_count
        show_header_toggle: false

      - type: glance
        title: Cheapest Premium 98 Station
        entities:
          - entity: sensor.perth_premium_98_cheapest_price
          - entity: sensor.perth_premium_98_cheapest_brand
          - entity: sensor.perth_premium_98_cheapest_address

  # Price History Graph - Diesel
  - type: history-graph
    title: Diesel Price Trend (7 Days)
    hours_to_show: 168
    entities:
      - entity: sensor.perth_diesel_minimum_price
        name: Minimum
      - entity: sensor.perth_diesel_average_price
        name: Average
      - entity: sensor.perth_diesel_maximum_price
        name: Maximum

  # Price History Graph - Premium 98
  - type: history-graph
    title: Premium 98 Price Trend (7 Days)
    hours_to_show: 168
    entities:
      - entity: sensor.perth_premium_98_minimum_price
        name: Minimum
      - entity: sensor.perth_premium_98_average_price
        name: Average
      - entity: sensor.perth_premium_98_maximum_price
        name: Maximum

  # Top 3 Cheapest Stations Details - Diesel
  - type: markdown
    title: 🏆 Top 3 Cheapest Diesel Stations
    content: |
      {% set top_3 = state_attr('sensor.perth_diesel_minimum_price', 'top_3') %}
      {% if top_3 %}
      {% for station in top_3 %}
      ### {{ loop.index }}. {{ station.brand }}
      **Price:** ${{ station.price }}  
      **Address:** {{ station.address }}  
      **Location:** {{ station.location }}
      
      {% endfor %}
      {% else %}
      *No data available*
      {% endif %}

  # Top 3 Cheapest Stations Details - Premium 98
  - type: markdown
    title: 🏆 Top 3 Cheapest Premium 98 Stations
    content: |
      {% set top_3 = state_attr('sensor.perth_premium_98_minimum_price', 'top_3') %}
      {% if top_3 %}
      {% for station in top_3 %}
      ### {{ loop.index }}. {{ station.brand }}
      **Price:** ${{ station.price }}  
      **Address:** {{ station.address }}  
      **Location:** {{ station.location }}
      
      {% endfor %}
      {% else %}
      *No data available*
      {% endif %}

  # Data Freshness
  - type: markdown
    content: |
      **Last Updated:** {{ state_attr('sensor.perth_diesel_minimum_price', 'fetched_at') }}  
      **Location:** {{ state_attr('sensor.perth_diesel_minimum_price', 'location') }}  
      **Day:** {{ state_attr('sensor.perth_diesel_minimum_price', 'day') }}

