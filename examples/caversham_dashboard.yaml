views:
  - title: FuelWatch
    path: fuelwatch
    icon: mdi:gas-station
    badges:
      - sensor.caversham_diesel_minimum_price
      - sensor.caversham_premium_98_minimum_price
    cards:
      - type: markdown
        content: |
          # ⛽ Diesel Prices
      - type: entities
        title: Current Diesel Prices
        entities:
          - sensor.caversham_diesel_minimum_price
          - sensor.caversham_diesel_average_price
          - sensor.caversham_diesel_maximum_price
          - sensor.caversham_diesel_cheapest_station
          - sensor.caversham_diesel_station_count
      - type: entities
        title: Diesel Analytics
        entities:
          - sensor.caversham_diesel_7_day_average
          - sensor.caversham_diesel_30_day_average
          - sensor.caversham_diesel_price_trend
          - sensor.caversham_diesel_weekly_change
          - sensor.caversham_diesel_volatility
      - type: history-graph
        title: Diesel 7-Day History
        hours_to_show: 168
        entities:
          - sensor.caversham_diesel_minimum_price
          - sensor.caversham_diesel_7_day_average
      - type: markdown
        title: Tomorrow's Diesel Forecast
        content: |
          {% set tomorrow = state_attr('sensor.caversham_diesel_minimum_price', 'tomorrow') %}
          {% if tomorrow %}
          **Tomorrow's Diesel Prices**:
          - **Minimum:** {{ tomorrow.min_price }} c/L
          - **Average:** {{ tomorrow.avg_price }} c/L
          - **Cheapest:** {{ tomorrow.cheapest_price }} c/L at {{ tomorrow.cheapest_brand }}
          - **Change:** {{ state_attr('sensor.caversham_diesel_minimum_price', 'price_change') }} c/L
          {% else %}
          Tomorrow's diesel prices not yet available.
          Published after **2:30 PM** daily.
          {% endif %}
      - type: markdown
        content: |
          # ⛽ Premium 98 Prices
      - type: entities
        title: Current Premium 98 Prices
        entities:
          - sensor.caversham_premium_98_minimum_price
          - sensor.caversham_premium_98_average_price
          - sensor.caversham_premium_98_maximum_price
          - sensor.caversham_premium_98_cheapest_station
          - sensor.caversham_premium_98_station_count
      - type: entities
        title: Premium 98 Analytics
        entities:
          - sensor.caversham_premium_98_7_day_average
          - sensor.caversham_premium_98_30_day_average
          - sensor.caversham_premium_98_price_trend
          - sensor.caversham_premium_98_weekly_change
          - sensor.caversham_premium_98_volatility
      - type: history-graph
        title: Premium 98 7-Day History
        hours_to_show: 168
        entities:
          - sensor.caversham_premium_98_minimum_price
          - sensor.caversham_premium_98_7_day_average
      - type: markdown
        title: Tomorrow's Premium 98 Forecast
        content: |
          {% set tomorrow = state_attr('sensor.caversham_premium_98_minimum_price', 'tomorrow') %}
          {% if tomorrow %}
          **Tomorrow's Premium 98 Prices**:
          - **Minimum:** {{ tomorrow.min_price }} c/L
          - **Average:** {{ tomorrow.avg_price }} c/L
          - **Cheapest:** {{ tomorrow.cheapest_price }} c/L at {{ tomorrow.cheapest_brand }}
          - **Change:** {{ state_attr('sensor.caversham_premium_98_minimum_price', 'price_change') }} c/L
          {% else %}
          Tomorrow's Premium 98 prices not yet available.
          Published after **2:30 PM** daily.
          {% endif %}
