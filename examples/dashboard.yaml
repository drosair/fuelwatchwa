# FuelWatch WA - Advanced Dashboard
# 
# Requires: ApexCharts Card from HACS
# Install via HACS → Frontend → Search "ApexCharts Card"
#
# Import this dashboard via:
# Home Assistant → Settings → Dashboards → + ADD DASHBOARD
# Choose "New dashboard from scratch"
# Click ⋮ → Raw configuration editor
# Delete everything and paste this YAML
#
# Replace "caversham" and "diesel" with your configured location and fuel type

views:
  - title: FuelWatch WA
    path: fuelwatch
    icon: mdi:gas-station
    badges:
      - entity: sensor.caversham_diesel_minimum_price
      - entity: sensor.caversham_diesel_7_day_average
      - entity: sensor.caversham_diesel_30_day_average
      - entity: sensor.caversham_diesel_price_trend
    cards:
      # Current Prices Overview
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # ⛽ Current Fuel Prices
          
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.caversham_diesel_minimum_price
                name: Minimum Price
                unit: c/L
                min: 150
                max: 250
                severity:
                  green: 150
                  yellow: 180
                  red: 200
              
              - type: gauge
                entity: sensor.caversham_diesel_average_price
                name: Average Price
                unit: c/L
                min: 150
                max: 250
                severity:
                  green: 150
                  yellow: 180
                  red: 200
              
              - type: gauge
                entity: sensor.caversham_diesel_maximum_price
                name: Maximum Price
                unit: c/L
                min: 150
                max: 250
                severity:
                  green: 150
                  yellow: 180
                  red: 200

      # Price Statistics
      - type: entities
        title: 📊 Price Statistics
        entities:
          - entity: sensor.caversham_diesel_minimum_price
            name: Today's Cheapest
          - entity: sensor.caversham_diesel_cheapest_station
            name: Cheapest Station
          - entity: sensor.caversham_diesel_cheapest_address
            name: Address
          - entity: sensor.caversham_diesel_station_count
            name: Total Stations
          - entity: sensor.caversham_diesel_price_spread
            name: Price Range

      # Analytics Sensors
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # 📈 Analytics & Trends
          
          - type: horizontal-stack
            cards:
              - type: statistic
                entity: sensor.caversham_diesel_7_day_average
                name: 7-Day Average
                icon: mdi:chart-line
              
              - type: statistic
                entity: sensor.caversham_diesel_30_day_average
                name: 30-Day Average
                icon: mdi:chart-timeline-variant
          
          - type: horizontal-stack
            cards:
              - type: statistic
                entity: sensor.caversham_diesel_price_trend
                name: Trend
                icon: mdi:trending-up
              
              - type: statistic
                entity: sensor.caversham_diesel_weekly_change
                name: Weekly Change
                icon: mdi:percent
                unit: '%'
          
          - type: statistic
            entity: sensor.caversham_diesel_volatility
            name: Price Volatility
            icon: mdi:chart-bell-curve

      # Historical Price Chart with ApexCharts
      - type: custom:apexcharts-card
        header:
          show: true
          title: 30-Day Price History
          show_states: true
        graph_span: 30d
        span:
          start: month
        series:
          - entity: sensor.caversham_diesel_minimum_price
            name: Minimum
            type: line
            stroke_width: 2
            color: green
            group_by:
              func: min
              duration: 1d
          
          - entity: sensor.caversham_diesel_average_price
            name: Average
            type: line
            stroke_width: 2
            color: blue
            group_by:
              func: avg
              duration: 1d
          
          - entity: sensor.caversham_diesel_maximum_price
            name: Maximum
            type: line
            stroke_width: 2
            color: red
            group_by:
              func: max
              duration: 1d
          
          - entity: sensor.caversham_diesel_7_day_average
            name: 7-Day Avg
            type: line
            stroke_width: 2
            color: orange
            curve: smooth
          
          - entity: sensor.caversham_diesel_30_day_average
            name: 30-Day Avg
            type: line
            stroke_width: 2
            color: purple
            curve: smooth

      # Tomorrow's Forecast
      - type: markdown
        content: |
          ## 🔮 Tomorrow's Forecast
          
          {% if state_attr('sensor.caversham_diesel_minimum_price', 'tomorrow') %}
          **Tomorrow's Prices** (available after 2:30 PM):
          - Min: {{ state_attr('sensor.caversham_diesel_minimum_price', 'tomorrow').min_price }} c/L
          - Avg: {{ state_attr('sensor.caversham_diesel_minimum_price', 'tomorrow').avg_price }} c/L
          - Cheapest: {{ state_attr('sensor.caversham_diesel_minimum_price', 'tomorrow').cheapest_price }} c/L
          - Change: {{ state_attr('sensor.caversham_diesel_minimum_price', 'price_change') }} c/L
          {% else %}
          Tomorrow's prices not yet available (published after 2:30 PM daily)
          {% endif %}

      # Quick Actions
      - type: entities
        title: ⚡ Quick Actions
        entities:
          - type: button
            name: Refresh Data
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: homeassistant.update_entity
              service_data:
                entity_id: sensor.caversham_diesel_minimum_price
          
          - type: button
            name: View on FuelWatch
            icon: mdi:open-in-new
            tap_action:
              action: url
              url_path: https://www.fuelwatch.wa.gov.au/
